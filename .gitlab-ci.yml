stages:
  - lint
  - format
  - type_check
  - test
  - coverage

lint_job:
  stage: lint
  image: node:20
  script:
    - npm ci
    - npx eslint .

format_job:
  stage: format
  image: node:20
  script:
    - npm ci
    - npx prettier --check .

type_check_job:
  stage: type_check
  image: node:20
  script:
    - npm ci
    - npx tsc --noEmit

test_job:
  stage: test
  image: node:20
  script:
    - npm ci
    - npx jest
    - npm audit

coverage_job:
  stage: coverage
  image: node:20
  script:
    - npm ci
    - npx jest --coverage
    # secret scanning with gitleaks
    - echo "Running secret scanning with gitleaks"
    # git-cliff changelog automation
    - echo "Generating changelog using git-cliff"
